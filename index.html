<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="site-shell">
    <header class="site-header">
      <a class="brand" href="#top">
        <span class="brand-line"></span>
        <span class="brand-line short"></span>
      </a>

      <nav class="site-nav" aria-label="Primary">
        <a href="#about"><span></span></a>
        <a href="#work"><span></span></a>
        <a href="#events"><span></span></a>
        <a href="#contact"><span></span></a>
      </nav>
    </header>

    <main id="top">
      <section class="hero">
        <div class="hero-copy">
          <div class="kicker editable"></div>
          <h1 class="display editable"></h1>
          <div class="lead editable"></div>
          <div class="hero-actions">
            <a class="ghost-link" href="#work"><span></span></a>
            <a class="ghost-link" href="#events"><span></span></a>
          </div>
        </div>

        <div class="hero-visual">
          <div class="portrait-frame">
            <div class="portrait"></div>
          </div>
        </div>
      </section>

      <section id="about" class="section split">
        <div class="section-label editable"></div>
        <div class="section-body">
          <div class="section-title editable"></div>
          <div class="text-block editable tall"></div>
        </div>
      </section>

      <section id="work" class="section">
        <div class="section-head">
          <div class="section-label editable"></div>
          <div class="section-title editable"></div>
        </div>

        <div class="card-grid">
          <article class="card">
            <div class="card-meta editable"></div>
            <div class="card-title editable"></div>
            <div class="card-text editable"></div>
          </article>

          <article class="card">
            <div class="card-meta editable"></div>
            <div class="card-title editable"></div>
            <div class="card-text editable"></div>
          </article>

          <article class="card">
            <div class="card-meta editable"></div>
            <div class="card-title editable"></div>
            <div class="card-text editable"></div>
          </article>
        </div>
      </section>

      <section id="events" class="section split">
        <div class="section-label editable"></div>

        <div class="event-list">
          <article class="event-row">
            <div class="event-date editable"></div>
            <div class="event-main">
              <div class="event-title editable"></div>
              <div class="event-meta editable"></div>
            </div>
          </article>

          <article class="event-row">
            <div class="event-date editable"></div>
            <div class="event-main">
              <div class="event-title editable"></div>
              <div class="event-meta editable"></div>
            </div>
          </article>

          <article class="event-row">
            <div class="event-date editable"></div>
            <div class="event-main">
              <div class="event-title editable"></div>
              <div class="event-meta editable"></div>
            </div>
          </article>
        </div>
      </section>

      <section id="contact" class="section contact-block">
        <div class="contact-title editable"></div>
        <div class="contact-links">
          <a href="#"><span></span></a>
          <a href="#"><span></span></a>
          <a href="#"><span></span></a>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="footer-line"></div>
    </footer>
  </div>
</body>
</html>
